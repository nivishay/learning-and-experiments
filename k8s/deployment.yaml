apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference
  labels:
    app: ml-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-inference
  template:
    metadata:
      labels:
        app: ml-inference
    spec:
      containers:
        - name: ml-inference
          image: ml-interface:v1
          imagePullPolicy: Never   # use local image — important for Minikube
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"          # 0.25 of a CPU core — guaranteed minimum
              memory: "512Mi"
            limits:
              cpu: "1000m"         # 1 full CPU core — hard ceiling
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
